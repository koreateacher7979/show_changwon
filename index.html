<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 메세지 전광판</title>
    <!-- 고급스럽고 가독성 높은 폰트 (Pretendard) 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 전역 및 리셋 설정: 스크롤 제거 및 전체화면 모드 최적화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 모든 해상도에서 스크롤 완벽 차단 */
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        /* 상단 헤더 영역 */
        header {
            flex: 0 0 auto;
            height: 8vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 3vw;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 2px solid #334155;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .header-title {
            /* clamp를 통해 최소, 권장, 최대 크기를 지정하여 화면 비율에 맞게 폰트 크기 자동 조절 */
            font-size: clamp(18px, 3.5vmin, 3.5vh);
            font-weight: 800;
            color: #facc15;
            text-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            width: 1.5vh;
            height: 1.5vh;
            background-color: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .developer-info {
            font-size: clamp(12px, 2vmin, 2vh);
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        /* 메인 전광판 컨테이너 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 2vw;
            gap: 1.5vh;
            overflow: hidden; /* 내부 요소가 넘치지 않도록 보호 */
        }

        /* 개별 메세지 카드 디자인 */
        .message-card {
            flex: 1;
            max-height: 17vh; /* 5개의 카드가 화면에 꽉 차게 들어갈 수 있는 최적의 높이 제한 */
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid #0ea5e9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 2vw;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.15);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* 작성자 영역 */
        .author-box {
            flex: 0 0 15%;
            min-width: 120px; /* 이름이 좁은 화면에서 뭉개지지 않도록 최소 너비 보장 */
            font-size: clamp(16px, 3.5vmin, 3.5vh);
            font-weight: 700;
            color: #38bdf8;
            text-align: center;
            border-right: 3px solid #334155;
            padding-right: 2vw;
            margin-right: 2vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 메세지 텍스트 영역 */
        .content-box {
            flex: 1;
            font-size: clamp(18px, 4.5vmin, 4.5vh);
            font-weight: 600;
            color: #f8fafc;
            line-height: 1.3;
            word-break: keep-all;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 최대 2줄까지만 표시하여 카드 높이 초과 방지 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 실시간 깜빡임 애니메이션 (Live 표시용) */
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 에러 발생 시 표시 영역 */
        #error-banner {
            display: none;
            background-color: #ef4444;
            color: white;
            text-align: center;
            padding: 1vh;
            font-size: 2vh;
            font-weight: bold;
        }

        /* ============================================================ */
        /* 모바일 최적화 레이아웃 (세로 방향의 스마트폰 화면 대응) */
        /* ============================================================ */
        @media (max-width: 768px) {
            header {
                height: 10vh; /* 모바일에서는 텍스트가 상하로 분리되므로 헤더를 약간 높임 */
                flex-direction: column;
                justify-content: center;
                gap: 0.5vh;
            }

            main {
                padding: 1.5vh 3vw;
                gap: 1vh;
            }

            .message-card {
                flex-direction: column; /* 카드의 요소들을 세로로 정렬 */
                align-items: flex-start;
                justify-content: center;
                padding: 1.5vh 4vw;
                gap: 0.8vh;
            }

            .author-box {
                flex: 0 0 auto;
                width: 100%;
                border-right: none; /* 우측 선 제거하고 하단 선으로 변경 */
                border-bottom: 2px solid #334155;
                padding-right: 0;
                padding-bottom: 0.5vh;
                margin-right: 0;
                text-align: left;
                font-size: clamp(14px, 4vw, 2.5vh);
            }

            .content-box {
                width: 100%;
                font-size: clamp(16px, 5vw, 3.5vh);
            }
        }
    </style>
</head>
<body>

    <!-- 에러 표시 배너 -->
    <div id="error-banner">데이터를 불러올 수 없습니다. 스프레드시트 공유 권한("링크가 있는 모든 사용자가 볼 수 있음")을 확인해주세요.</div>

    <!-- 상단 정보 -->
    <header>
        <div class="header-title">
            <div class="live-indicator"></div>
            실시간 공지사항
        </div>
        <div class="developer-info">개발자:가치있는 미래교육 연구소 대표 김병찬</div>
    </header>

    <!-- 전광판 내용이 표시될 영역 -->
    <main id="board-container">
        <!-- 자바스크립트를 통해 이곳에 메세지 카드가 렌더링 됩니다. -->
    </main>

    <script>
        // 구글 스프레드시트 설정
        const SHEET_ID = '1-tByzfbh-hbGX1uJXAYPxqnyaTI07Y6yrdODnX8pBHc';
        const SHEET_NAME = '메세지입력';
        // Google Visualization API URL (데이터를 JSON 형태로 바로 가져옴, headers=1로 첫 행을 헤더로 인식)
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}&headers=1`;

        // 이전 데이터를 저장하여 변경사항이 있을 때만 화면을 갱신 (화면 깜빡임 방지용)
        let previousDataHash = "";

        /**
         * 구글 스프레드시트에서 데이터를 가져오는 함수
         */
        async function fetchMessages() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                
                // GViz API의 응답은 일반 JSON이 아닌 콜백 함수 형태이므로 정규식으로 JSON 부분만 추출
                const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/);
                
                if (!match) {
                    throw new Error("데이터 형식이 올바르지 않습니다.");
                }

                const data = JSON.parse(match[1]);
                const rows = data.table.rows;
                let parsedMessages = [];

                // 2행부터 데이터 읽기 (GViz API가 headers=1 옵션으로 1행을 열(col) 속성으로 자동 분리함)
                for (let i = 0; i < rows.length; i++) {
                    if (parsedMessages.length >= 5) break; // 최대 5개까지만 가져옴

                    const row = rows[i];
                    if (!row || !row.c) continue;

                    // A열: c[0](순번), B열: c[1](작성자), C열: c[2](메세지)
                    const author = row.c[1] ? row.c[1].v : '';
                    const message = row.c[2] ? row.c[2].v : '';

                    // 메세지가 비어있으면 건너뜀
                    if (!message && !author) continue;

                    parsedMessages.push({ author, message });
                }

                // 현재 가져온 데이터를 문자열로 변환하여 이전 데이터와 비교
                const currentDataHash = JSON.stringify(parsedMessages);
                
                // 변경된 내용이 없을 경우 어떠한 반응도 하지 않음 (화면 깜빡임 완벽 차단)
                if (currentDataHash === previousDataHash) {
                    document.getElementById('error-banner').style.display = 'none';
                    return; 
                }

                // 변경사항이 있으면 데이터를 업데이트하고 DOM을 재렌더링
                previousDataHash = currentDataHash;
                renderBoard(parsedMessages);
                document.getElementById('error-banner').style.display = 'none';

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('error-banner').style.display = 'block';
            }
        }

        /**
         * 화면에 메세지 카드를 그려주는 함수
         * @param {Array} messages - 파싱된 메세지 객체 배열
         */
        function renderBoard(messages) {
            const container = document.getElementById('board-container');
            container.innerHTML = ''; // 기존 내용 지우기

            // 메세지가 아예 없을 경우 중앙에 안내 문구 표시
            if (messages.length === 0) {
                container.innerHTML = `
                    <div style="flex:1; display:flex; align-items:center; justify-content:center; text-align:center; font-size:clamp(18px, 4vmin, 4vh); color:#475569;">
                        대기 중인 공지 메세지가 없습니다.
                    </div>`;
                return;
            }

            // 실제 존재하는 데이터 개수만큼만 카드를 생성
            messages.forEach(msg => {
                const card = document.createElement('div');
                card.className = 'message-card';
                card.innerHTML = `
                    <div class="author-box">${msg.author || '익명'}</div>
                    <div class="content-box">${msg.message}</div>
                `;
                container.appendChild(card);
            });
        }

        // 1. 페이지 로드 시 즉시 1회 실행
        fetchMessages();

        // 2. 1초(1000ms) 간격으로 지속적으로 동기화 처리
        setInterval(fetchMessages, 1000);

    </script>
</body>
</html>
